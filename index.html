<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本丸資材管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <!-- ヘッダー部分 -->
        <header>
            <h1>資材状況 <button id="openModalBtn" class="plus-btn">+</button></h1>
        </header>

        <!-- グラフを一番上に配置 -->
        <div class="chart-section">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <!-- モーダル（最初は隠れている） -->
    <div id="inputModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>資材報告</h2>
            <div class="form-group">
                <label>日付</label>
                <input type="date" id="date">
            </div>
            <div class="form-group">
                <label>木炭</label>
                <input type="number" id="charcoal" placeholder="0">
            </div>
            <div class="form-group">
                <label>玉鋼</label>
                <input type="number" id="steel" placeholder="0">
            </div>
            <div class="form-group">
                <label>冷却材</label>
                <input type="number" id="coolant" placeholder="0">
            </div>
            <div class="form-group">
                <label>砥石</label>
                <input type="number" id="whetstone" placeholder="0">
            </div>
            <button id="saveBtn" class="submit-btn">RECORD TO CLOUD</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
