<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本丸資材・育成管理システム</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <header>
        <div id="userInfo">(未ログイン)</div>
        <button id="loginBtn" class="btn-auth">ログイン</button>
    </header>

    <nav class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('resourceTab')">資材管理</button>
        <button class="tab-btn" onclick="switchTab('toukenTab')">刀剣育成</button>
    </nav>

    <main>
        <!-- 資材管理タブ -->
        <section id="resourceTab" class="tab-content active">
            <div class="btn-group">
                <button id="openModalBtn" class="btn-action red">＋資材登録</button>
                <button id="openItemModalBtn" class="btn-action black">＋小判・札登録</button>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="itemChart"></canvas>
            </div>
        </section>

        <!-- 刀剣育成タブ -->
        <section id="toukenTab" class="tab-content">
            <div class="btn-group">
                <button id="openMasterModalBtn" class="btn-action black">＋刀剣(極)登録</button>
                <button id="openLevelModalBtn" class="btn-action red">＋レベル登録</button>
                <button id="openLevelEditBtn" class="btn-action black">修正</button>
            </div>

            <div class="filter-group">
                <select id="filterType">
                    <option value="all">すべての刀種</option>
                    <option value="短刀(極)">短刀(極)</option>
                    <option value="打刀(極)">打刀(極)</option>
                    <option value="太刀(極)">太刀(極)</option>
                    <option value="短刀">短刀</option>
                    <option value="打刀">打刀</option>
                    <option value="太刀">太刀</option>
                </select>
                <select id="filterRarity">
                    <option value="all">すべてのレア度</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option>
                </select>
            </div>

            <div class="chart-container">
                <canvas id="levelChart"></canvas>
            </div>

            <div class="ranking-section">
                <h3>直近30日の成長TOP10</h3>
                <div id="rankingList"></div>
                <div class="chart-container-sm">
                    <canvas id="top10Chart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <!-- モーダル：レベル登録 -->
    <div id="levelModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('levelModal')">&times;</span>
            <h2>刀剣レベル登録</h2>
            <input type="date" id="lvDate" class="input-date">
            <div id="levelInputContainer">
                <div class="input-row">
                    <select id="type_1" onchange="updateRarityOptions(1)">
                        <option value="">刀種</option>
                        <option value="短刀(極)">短刀(極)</option><option value="打刀(極)">打刀(極)</option>
                        <option value="太刀(極)">太刀(極)</option><option value="短刀">短刀</option>
                        <option value="打刀">打刀</option><option value="太刀">太刀</option>
                    </select>
                    <select id="rarity_1" onchange="updateNameOptions(1)"><option>レア度</option></select>
                    <select id="name_1"><option>名前</option></select>
                    <input type="number" id="lv_1" placeholder="Lv">
                </div>
            </div>
            <button id="addRowBtn" class="btn-sub">＋行を追加</button>
            <button id="saveLevelBtn" class="btn-save">一括登録</button>
        </div>
    </div>

    <!-- モーダル：刀剣(極)名簿登録 -->
    <div id="masterModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('masterModal')">&times;</span>
            <h2>名簿に新規追加</h2>
            <input type="text" id="newMasterName" placeholder="刀剣男士の名前">
            <select id="newMasterType">
                <option value="短刀(極)">短刀(極)</option><option value="打刀(極)">打刀(極)</option>
                <option value="太刀(極)">太刀(極)</option><option value="短刀">短刀</option>
                <option value="打刀">打刀</option><option value="太刀">太刀</option>
            </select>
            <input type="number" id="newMasterRarity" placeholder="レア度(1-5)" min="1" max="5">
            <button id="saveMasterBtn" class="btn-save">名簿に登録</button>
        </div>
    </div>

    <!-- モーダル：修正 -->
    <div id="levelEditSection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('levelEditSection')">&times;</span>
            <h2>レベル記録の修正</h2>
            <div id="levelEditList"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
