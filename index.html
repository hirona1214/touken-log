<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本丸資材管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="main-title">資材状況</h1>
            <button id="openModalBtn" class="plus-report-btn">＋報告</button>
        </header>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <!-- モーダル（報告画面） -->
    <div id="inputModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 class="modal-title">資材報告</h2>
            
            <div class="input-group">
                <label>日付</label>
                <input type="date" id="date">
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>木炭</label>
                    <input type="number" id="charcoal" placeholder="0">
                </div>
                <div class="input-group">
                    <label>玉鋼</label>
                    <input type="number" id="steel" placeholder="0">
                </div>
                <div class="input-group">
                    <label>冷却材</label>
                    <input type="number" id="coolant" placeholder="0">
                </div>
                <div class="input-group">
                    <label>砥石</label>
                    <input type="number" id="whetstone" placeholder="0">
                </div>
            </div>
            <button id="saveBtn" class="record-btn">RECORD TO CLOUD</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
