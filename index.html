<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本丸資材・育成管理システム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="image/logo.png" alt="本丸帳" class="site-logo">
            <h1 class="site-title">本丸記録帖</h1>
            <span class="title-separator">|</span>
            <div id="userInfo">(未ログイン)</div>
        </div>
        <button id="loginBtn" class="btn-green-style">ログイン</button>
    </header>

    <nav class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('resourceTab')">資材管理</button>
        <button class="tab-btn" onclick="switchTab('toukenTab')">刀剣育成</button>
    </nav>

    <main>
        <!-- 資材管理タブ -->
        <section id="resourceTab" class="tab-content active">
            <div class="chart-section-container resource-section">
                <div class="chart-inner-header">
                    <img src="image/logo.png" class="inner-header-logo">
                    <h2 class="chart-inner-title">資材</h2>
                    <button id="openModalBtn" class="btn-pk-style">登録</button>
                    <button id="openResourceEditBtn" class="btn-green-style">修正・削除</button>
                </div>
                
                <div class="chart-inner-body">
                    <div class="period-selector resource-period-selector">
                        <button class="period-btn active" data-period="all">全期間</button>
                        <button class="period-btn" data-period="1y">1年</button>
                        <button class="period-btn" data-period="6m">半年</button>
                        <button class="period-btn" data-period="3m">3か月</button>
                        <button class="period-btn" data-period="1m">1か月</button>
                        <button class="period-btn" data-period="1w">1週間</button>
                    </div>
                    
                    <div class="canvas-wrapper">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 小判・札グラフ -->
            <div class="chart-section-container item-section">
                <div class="chart-inner-header">
                    <img src="image/logo.png" class="inner-header-logo">
                    <h2 class="chart-inner-title">小判・札</h2>
                    <button id="openItemModalBtn" class="btn-pk-style">登録</button>
                    <button id="openItemEditBtn" class="btn-green-style">修正・削除</button>
                </div>
                
                <div class="chart-inner-body">
                    <div class="period-selector resource-period-selector">
                        <button class="period-btn active" data-period="all">全期間</button>
                        <button class="period-btn" data-period="1y">1年</button>
                        <button class="period-btn" data-period="6m">半年</button>
                        <button class="period-btn" data-period="3m">3か月</button>
                        <button class="period-btn" data-period="1m">1か月</button>
                        <button class="period-btn" data-period="1w">1週間</button>
                    </div>

                    <div class="canvas-wrapper">
                        <canvas id="itemChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 刀剣育成タブ -->
        <section id="toukenTab" class="tab-content">
            <!-- 刀剣男士レベルグラフ -->
            <div class="chart-section-container touken-level-section">
                <div class="chart-inner-header">
                    <img src="image/logo.png" class="inner-header-logo">
                    <h2 class="chart-inner-title">刀剣男士レベル</h2>
                    <button id="openLevelModalBtn" class="btn-pk-style">登録</button>
                    <button id="openLevelEditBtn" class="btn-green-style">修正・削除</button>
                </div>

                <div class="chart-inner-body">
                    <div class="touken-filter-row">
                        <label class="filter-item">
                            <span>刀種</span>
                            <select id="filterType">
                                <option value="all">すべて</option>
                                <option value="短刀(極)">短刀(極)</option>
                                <option value="脇差(極)">脇差(極)</option>
                                <option value="打刀(極)">打刀(極)</option>
                                <option value="太刀(極)">太刀(極)</option>
                                <option value="大太刀(極)">大太刀(極)</option>
                                <option value="槍(極)">槍(極)</option>
                                <option value="薙刀(極)">薙刀(極)</option>
                                <option value="剣(極)">剣(極)</option>
                            </select>
                        </label>

                        <label class="filter-item">
                            <span>レア度</span>
                            <select id="filterRarity">
                                <option value="all">すべて</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                            </select>
                        </label>
                    </div>

                    <div class="period-selector touken-period-selector">
                        <button class="period-btn active" data-period="all">全期間</button>
                        <button class="period-btn" data-period="1y">1年</button>
                        <button class="period-btn" data-period="6m">半年</button>
                        <button class="period-btn" data-period="3m">3か月</button>
                        <button class="period-btn" data-period="1m">1か月</button>
                        <button class="period-btn" data-period="1w">1週間</button>
                    </div>

                    <div class="canvas-wrapper touken-level-wrapper">
                        <canvas id="levelChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 成長TOP10 -->
            <div class="chart-section-container ranking-section">
                <div class="chart-inner-header">
                    <img src="image/logo.png" class="inner-header-logo">
                    <h2 class="chart-inner-title">直近30日の成長TOP10</h2>
                </div>

                <div class="chart-inner-body">
                    <div class="ranking-layout">
                        <div class="ranking-list-container">
                            <div id="rankingList"></div>
                        </div>
                        <div class="ranking-chart-container">
                            <canvas id="top10Chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="page-divider">

            <div class="master-admin-section">
                <p class="master-admin-note"></p>
                <div class="btn-group">
                    <button id="openMasterModalBtn" class="btn-green-style">名簿に新規登録</button>
                    <button id="openMasterEditBtn" class="btn-green-style">名簿の修正・削除</button>
                    <button id="openCsvBtn" class="btn-pk-style">CSVから登録</button>
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden-input">
                </div>
            </div>
        </section>
    </main>

    <!-- モーダル：資材登録 -->
    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('resourceModal')">&times;</span>
            <h2>資材登録</h2>
            <input type="date" id="date" class="input-date">
            <div class="input-grid">
                <input type="number" id="charcoal" placeholder="木炭">
                <input type="number" id="steel" placeholder="玉鋼">
                <input type="number" id="coolant" placeholder="冷却材">
                <input type="number" id="whetstone" placeholder="砥石">
            </div>
            <button id="saveBtn" class="btn-save">資材を保存</button>
        </div>
    </div>

    <!-- モーダル：小判・札登録 -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('itemModal')">&times;</span>
            <h2>小判・札登録</h2>
            <input type="date" id="itemDate" class="input-date">
            <div class="input-grid">
                <input type="number" id="koban" placeholder="小判">
                <input type="number" id="requestTicket" placeholder="依頼札">
                <input type="number" id="helpTicket" placeholder="手伝札">
            </div>
            <button id="saveItemBtn" class="btn-save">アイテムを保存</button>
        </div>
    </div>

<!-- モーダル：レベル登録 -->
<div id="levelModal" class="modal level-modal">
    <div class="modal-content level-modal-content">
        <button type="button" class="level-modal-close" onclick="closeModal('levelModal')" aria-label="閉じる">
            &times;
        </button>

        <div class="level-modal-header">
            <div>
                <p class="level-modal-kicker">刀剣育成</p>
                <h2 class="level-modal-title">刀剣レベル登録</h2>
            </div>
        </div>

        <div class="level-modal-body">
            <label class="level-field level-date-field">
                <span class="level-field-label">記録日</span>
                <input type="date" id="lvDate" class="input-date level-date-input">
            </label>

            <div class="level-upload-card">
                <div class="level-upload-text">
                    <span class="level-upload-title">自動入力</span>
                    <span class="level-upload-sub">画像を読み込んで、名前とレベルを候補入力します。</span>
                </div>

                <input type="file" id="imageUpload" accept="image/*" class="hidden-input" onchange="handleImageUpload(this)">

                <button type="button" onclick="document.getElementById('imageUpload').click()" class="btn-img-analyze">
                    <span class="btn-img-icon">📸</span>
                    <span>画像を選択して解析</span>
                </button>

                <div id="aiLoading" class="ai-status-msg level-ai-status">
                    解析中...
                </div>
            </div>

            <div id="levelInputContainer" class="level-input-list"></div>

            <div class="level-modal-actions">
                <button id="addRowBtn" class="btn-level-add">＋ 行を追加</button>
                <button id="saveLevelBtn" class="btn-level-save">登録</button>
            </div>
        </div>
    </div>
</div>

    <!-- モーダル：名簿登録 -->
    <div id="masterModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('masterModal')">&times;</span>
            <h2>名簿に新規追加</h2>
            <input type="text" id="newMasterName" class="master-modal-input" placeholder="刀剣男士の名前">
            <select id="newMasterType" class="master-modal-input">
                <option value="短刀(極)">短刀(極)</option><option value="脇差(極)">脇差(極)</option>
                <option value="打刀(極)">打刀(極)</option><option value="太刀(極)">太刀(極)</option>
                <option value="大太刀(極)">大太刀(極)</option><option value="槍(極)">槍(極)</option>
                <option value="薙刀(極)">薙刀(極)</option><option value="剣(極)">剣(極)</option>
            </select>
            <input type="number" id="newMasterRarity" class="master-modal-input" placeholder="レア度(2-6)">
            <button id="saveMasterBtn" class="btn-save">名簿に登録</button>
        </div>
    </div>

    <!-- モーダル：レベル記録の修正 -->
    <div id="levelEditSection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('levelEditSection')">&times;</span>
            <h2>レベル記録の修正・削除</h2>
            <p class="modal-note">
                内容を書き換えて「更新」を押すと上書きされます。
            </p>
            <div id="levelEditList" class="edit-list"></div>
        </div>
    </div>

    <!-- ★モーダル：名簿（マスタ）の修正・削除（アップグレード版） -->
    <div id="masterEditSection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('masterEditSection')">&times;</span>
            <h2>名簿の管理（修正・削除）</h2>
            <p class="modal-note">
                内容を書き換えて「更新」を押すと上書きされます。
            </p>
            <div id="masterEditList" class="master-edit-list">
                <!-- ここにJavaScriptで編集用フォームが生成されます -->
            </div>
        </div>
    </div>
        <!-- モーダル：資材の修正・削除 -->
    <div id="resourceEditSection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('resourceEditSection')">&times;</span>
            <h2>資材の修正・削除</h2>
            <p class="modal-note">
                内容を書き換えて「更新」を押すと上書きされます。
            </p>
            <div id="resourceEditList" class="edit-list"></div>
        </div>
    </div>

    <!-- モーダル：小判・札の修正・削除 -->
    <div id="itemEditSection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('itemEditSection')">&times;</span>
            <h2>小判・札の修正・削除</h2>
            <p class="modal-note">
                内容を書き換えて「更新」を押すと上書きされます。
            </p>
            <div id="itemEditList" class="edit-list"></div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
